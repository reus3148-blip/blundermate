<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
    <title>Blundermate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/chessground@9.0.0/assets/chessground.base.css">
    <link rel="stylesheet" href="https://unpkg.com/chessground@9.0.0/assets/chessground.brown.css">
    <link rel="stylesheet" href="https://unpkg.com/chessground@9.0.0/assets/chessground.cburnett.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Fix Home View layout to prevent full-page scrolling */
        #homeView {
            height: 100vh;
            height: 100dvh; /* 모바일 브라우저 주소창 고려 */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #homeView main, 
        #homeView .input-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #homeView header, 
        #homeView .api-controls, 
        #homeView .manual-input-toggle,
        #homeView .manual-input-wrapper,
        #openVaultBtn {
            flex-shrink: 0;
        }
        #gamesList {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Home View -->
        <div id="homeView" class="view-container">
            <header>
                <h1>Blundermate</h1>
            </header>

            <main>
                <section class="input-section">
                    <!-- API Input Layout -->
                    <div class="api-controls">
                        <input type="text" id="usernameInput" class="text-input" placeholder="Enter Chess.com Username" value="" />
                        <button id="fetchBtn" class="primary-btn">Fetch Games</button>
                    </div>
                    
                    <div id="gamesList" class="games-list"></div>

                    <!-- Manual PGN Fallback -->
                    <div class="manual-input-toggle">
                        <button id="toggleManualBtn" class="text-btn">Or paste PGN manually</button>
                    </div>

                    <div id="manualInputWrapper" class="manual-input-wrapper hidden">
                        <textarea id="pgnInput" placeholder="Paste your PGN here... e.g. 1. e4 e5"></textarea>
                        <button id="analyzeBtn" class="primary-btn">Start Review</button>
                    </div>

                    <button id="openVaultBtn" class="control-btn" style="width: 100%; margin-top: 1rem; border-color: var(--primary-color); color: var(--primary-color); max-width: none;">📂 Open My Vault</button>
                    <button id="openSavedGamesBtn" class="control-btn" style="width: 100%; margin-top: 0.5rem; border-color: var(--accent-success); color: var(--accent-success); max-width: none;">💾 Open Saved Games</button>
                </section>
            </main>
        </div>

        <!-- Analysis View (Hidden by default) -->
        <div id="analysisView" class="view-container hidden">
            <div class="analysis-top-bar">
                <button id="backBtn" class="text-btn" style="font-size: 1rem; font-weight: 600; width: 60px; text-align: left;">← Back</button>
                <div style="display: flex; align-items: center; width: 220px;">
                    <div style="width: 100px; display: flex; justify-content: flex-end;">
                        <div id="topEvalDisplay" class="top-eval-display">-</div>
                    </div>
                    <div id="moveClassification" style="width: 120px; text-align: left; padding-left: 10px; font-size: 0.95rem; font-weight: 600; text-transform: uppercase;"></div>
                </div>
                <div style="width: 60px;"></div>
            </div>

            <section class="results-section">
                <div class="analysis-board">
                    <div id="boardContainer" class="board-container"></div>
                    <div class="board-controls">
                        <button id="prevMoveBtn" class="control-btn">◀ Prev</button>
                        <button id="saveMoveBtn" class="control-btn save-btn">💾 Save</button>
                        <button id="nextMoveBtn" class="control-btn">Next ▶</button>
                    </div>
                    <button id="returnMainLineBtn" class="control-btn hidden" style="width: calc(100% - 2rem); margin: 0 auto 0.5rem auto; max-width: none; background: rgba(245, 158, 11, 0.15); border-color: var(--accent-warning); color: var(--accent-warning);">↩ Return to Main Line</button>
                    <div id="engineLines" class="engine-lines-container"></div>
                    <div class="moves-container">
                        <table id="movesTable">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>White</th>
                                    <th>Black</th>
                                </tr>
                            </thead>
                            <tbody id="movesBody">
                                <!-- Moves will be dynamically inserted here -->
                                <tr>
                                    <td colspan="3" class="empty-state">No moves analyzed yet.</td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="status-bar" style="padding: 1rem; justify-content: center; border-top: 1px solid var(--border-color);">
                            <span id="engineStatus" class="tag engine-loading">Engine...</span>
                            <span id="analysisStatus" class="tag hidden">Waiting...</span>
                        </div>
                    </div>
                </div>
            </section>
        </div>

    <!-- Vault View -->
    <div id="vaultView" class="view-container hidden">
        <div class="analysis-top-bar">
            <button id="vaultBackBtn" class="text-btn" style="font-size: 1rem; font-weight: 600;">← Back</button>
            <div style="font-weight: bold; font-size: 1.1rem;">My Vault</div>
            <div style="width: 60px;"></div>
        </div>
        <div id="vaultList" class="games-list" style="padding: 1rem; max-height: none; flex: 1; overflow-y: auto;"></div>
    </div>

    <!-- Saved Games View -->
    <div id="savedGamesView" class="view-container hidden">
        <div class="analysis-top-bar">
            <button id="savedGamesBackBtn" class="text-btn" style="font-size: 1rem; font-weight: 600;">← Back</button>
            <div style="font-weight: bold; font-size: 1.1rem;">Saved Games</div>
            <div style="width: 60px;"></div>
        </div>
        <div id="savedGamesList" class="games-list" style="padding: 1rem; max-height: none; flex: 1; overflow-y: auto;"></div>
    </div>

    <!-- Practice View -->
    <div id="practiceView" class="view-container hidden">
        <div class="analysis-top-bar">
            <button id="practiceBackBtn" class="text-btn" style="font-size: 1rem; font-weight: 600;">← Vault</button>
            <div id="practiceFeedback" class="top-eval-display">Find Best Move</div>
            <div style="width: 60px;"></div>
        </div>
        <section class="results-section">
            <div class="analysis-board">
                <div id="practiceBoardContainer" class="board-container"></div>
            </div>
        </section>
    </div>
    </div>

    <!-- Save Choice Modal -->
    <div id="saveChoiceModal" class="modal-overlay hidden">
        <div class="modal-content" style="max-width: 320px;">
            <h2 style="text-align: center;">What to save?</h2>
            <div class="modal-actions" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
                <button id="choiceSaveMoveBtn" class="primary-btn" style="width: 100%; text-align: center; justify-content: center; display: flex;">Save This Move (Vault)</button>
                <button id="choiceSaveGameBtn" class="control-btn" style="width: 100%; max-width: none; color: var(--text-primary);">Save Entire Game</button>
                <button id="cancelChoiceBtn" class="text-btn" style="margin-top: 0.5rem;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Save Game Modal -->
    <div id="saveGameModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Save Entire Game</h2>
            <div class="form-group">
                <label>Title / Players</label>
                <input type="text" id="saveGameTitle" class="text-input" placeholder="e.g. Me vs Magnus">
            </div>
            <div class="form-group">
                <label>Notes (Optional)</label>
                <textarea id="saveGameNotes" placeholder="Great attacking game..." style="height: 80px;"></textarea>
            </div>
            <div class="modal-actions">
                <button id="cancelSaveGameBtn" class="text-btn">Cancel</button>
                <button id="confirmSaveGameBtn" class="primary-btn">Save Game</button>
            </div>
        </div>
    </div>

    <!-- Save Move Modal -->
    <div id="saveModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Save to Vault</h2>
            <p id="saveMoveText" class="save-move-text"></p>
            <p id="saveBestMoveText" style="text-align: center; color: var(--accent-success); font-size: 0.95rem; margin-top: -0.5rem; margin-bottom: 0.5rem; font-weight: 600;"></p>
            <div class="form-group">
                <label>Category</label>
                <select id="saveCategory" class="text-input" style="appearance: auto;">
                    <option value="blunder">Blunder (??)</option>
                    <option value="mistake">Mistake (?)</option>
                    <option value="missed">Missed Win (?!)</option>
                    <option value="tactic">Tactical Error</option>
                    <option value="positional">Positional Error</option>
                </select>
            </div>
            <div class="form-group">
                <label>Notes (Optional)</label>
                <textarea id="saveNotes" placeholder="Why did you play this? What was the right move?" style="height: 80px;"></textarea>
            </div>
            <div class="modal-actions">
                <button id="cancelSaveBtn" class="text-btn">Cancel</button>
                <button id="confirmSaveBtn" class="primary-btn">Save Move</button>
            </div>
        </div>
    </div>

    <!-- Chess.js library for PGN parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
