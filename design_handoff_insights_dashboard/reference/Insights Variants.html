<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Blundermate — Insights Variants</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #1C1D1F; font-family: 'Inter', sans-serif; }
  body { overflow: hidden; }
  *::-webkit-scrollbar { width: 0; height: 0; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="../icons.jsx"></script>
<script type="text/babel" src="_shared.jsx"></script>
<script type="text/babel" src="variant-a.jsx"></script>
<script type="text/babel" src="variant-b.jsx"></script>
<script type="text/babel" src="variant-b-cards.jsx"></script>
<script type="text/babel" src="variant-b-shells.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard,
          BMInsightsVariantA, BMInsightsVariantB,
          BMInsightsB_D, BMInsightsB_C, BMInsightsB_A,
          TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakToggle, TweakColor, TweakSelect } = window;

  const PHONE_W = 390;
  const PHONE_H = 844;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accentA": "#D03832",
    "accentB": "#2B5BD7",
    "chartStyle": "line",
    "density": "comfortable",
    "darkMode": false,
    "lang": "en"
  }/*EDITMODE-END*/;

  // Phone wrapper (no separate iOS frame here — the screen IS the artboard)
  const PhoneFrame = ({ children, dark = false }) => (
    <div style={{
      width: PHONE_W + 24, height: PHONE_H + 24,
      background: '#1C1D1F', borderRadius: 50, padding: 12,
      boxShadow: '0 0 0 1px rgba(255,255,255,.06) inset, 0 30px 60px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3)',
      position: 'relative',
    }}>
      <div style={{
        width: PHONE_W, height: PHONE_H,
        background: dark ? '#16171A' : '#FAF8F4',
        borderRadius: 38, overflow: 'hidden', position: 'relative',
      }}>
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0, height: 47,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '0 28px', zIndex: 10,
          fontSize: 15, fontWeight: 600, color: dark ? '#fff' : '#1C1D1F',
          pointerEvents: 'none',
        }}>
          <span>9:41</span>
          <span style={{
            position: 'absolute', left: '50%', transform: 'translateX(-50%)',
            top: 11, width: 100, height: 28, borderRadius: 16, background: '#000',
          }}></span>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
            <svg width="18" height="11" viewBox="0 0 18 11" fill="currentColor"><rect x="0" y="6" width="3" height="5" rx=".5"/><rect x="5" y="3" width="3" height="8" rx=".5"/><rect x="10" y="0" width="3" height="11" rx=".5"/><rect x="15" y="2" width="3" height="9" rx=".5" opacity=".4"/></svg>
            <svg width="16" height="11" viewBox="0 0 16 11" fill="none" stroke="currentColor" strokeWidth="1"><path d="M.5 4.2a11 11 0 0 1 15 0M3 6.7a7 7 0 0 1 10 0M5.5 9.2a3 3 0 0 1 5 0"/></svg>
            <svg width="24" height="11" viewBox="0 0 24 11" fill="none" stroke="currentColor" strokeWidth="1"><rect x="1" y="1" width="20" height="9" rx="2"/><rect x="3" y="3" width="14" height="5" rx="1" fill="currentColor"/><rect x="22" y="4" width="1.5" height="3" rx=".5" fill="currentColor"/></svg>
          </span>
        </div>
        <div style={{ position: 'absolute', inset: 0, paddingTop: 47 }}>
          {children}
        </div>
        <div style={{
          position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)',
          width: 134, height: 5, borderRadius: 3, background: dark ? '#fff' : '#1C1D1F',
          opacity: 0.4, zIndex: 10,
        }}></div>
      </div>
    </div>
  );

  const ART_W = PHONE_W + 24;
  const ART_H = PHONE_H + 24;

  // Cover — design rationale
  const CoverArtboard = ({ data }) => (
    <div style={{
      width: 720, height: ART_H, background: '#FAF8F4',
      borderRadius: 12, padding: '60px 56px',
      display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
      fontFamily: "'Inter', sans-serif", color: '#14140F',
    }}>
      <div>
        <div style={{
          fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase',
          color: '#9A9CA3', fontWeight: 600,
        }}>Insights · 통계 화면 개선</div>
        <div style={{ fontSize: 14, marginTop: 8, color: '#62646A' }}>
          chess.com 결과 API만 사용 · Stockfish 없음 · 관찰 전용
        </div>
      </div>
      <div>
        <h1 style={{
          fontSize: 48, fontWeight: 600, letterSpacing: '-0.04em',
          lineHeight: 1.05, margin: 0,
        }}>
          엔진 없이도<br/>
          <em style={{ fontStyle: 'normal', color: '#2B5BD7' }}>충분한 통계</em>.
        </h1>
        <p style={{ fontSize: 16, lineHeight: 1.55, color: '#62646A', marginTop: 20, maxWidth: 520 }}>
          현재 앱은 Stockfish 분석 없이 chess.com 결과 API만 사용합니다.
          정확도(%) · 수의 질 · 단계별 정확도는 <b style={{ color: '#14140F' }}>제공 불가</b>.
          대신 결과·레이팅·오프닝·종료 사유·시간대 만으로 풍부한 대시보드를 구성했습니다.
        </p>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
        <Principle n="A" t="Daily Card"
          d="30일 요약 hero + 레이팅 라인 + 색상별 승률 + 주력 오프닝 + 시간대 히트맵. 큰 활자, 한 컬럼 리듬." />
        <Principle n="B" t="Grid Dashboard"
          d="2×3 KPI + 멀티 레이팅 라인 + 결과 리본 + 색상·종료 사유 도넛 + 시간 컨트롤 + 상대 레이팅대 + 오프닝 표 + 게임 길이 + 첫 수 + 시간대 히트맵." />
      </div>
    </div>
  );
  const Principle = ({ n, t, d }) => (
    <div>
      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', color: '#9A9CA3' }}>변형 {n}</div>
      <div style={{ fontSize: 18, fontWeight: 600, marginTop: 4, color: '#14140F', letterSpacing: '-0.01em' }}>{t}</div>
      <div style={{ fontSize: 13, lineHeight: 1.5, marginTop: 6, color: '#62646A' }}>{d}</div>
    </div>
  );

  // Before snapshot — describe old screen briefly
  const BeforeArtboard = () => (
    <div style={{
      width: 480, height: ART_H, background: '#FAF8F4',
      borderRadius: 12, padding: '40px 36px',
      fontFamily: "'Inter', sans-serif", color: '#14140F',
      display: 'flex', flexDirection: 'column', gap: 20,
    }}>
      <div>
        <div style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase',
                        color: '#9A9CA3', fontWeight: 600 }}>Before</div>
        <h2 style={{ fontSize: 26, margin: '6px 0 0 0', letterSpacing: '-0.03em', fontWeight: 600 }}>
          현재 통계 화면의 문제
        </h2>
      </div>
      <Issue
        n="01" t="엔진 없음 = 정확도 없음"
        d="Stockfish가 없으므로 정확도(%) · 수의 질(브릴/블런더) · 단계별 정확도는 제거. 결과 API만 사용." />
      <Issue
        n="02" t="결과 데이터의 풍부함"
        d="chess.com이 주는 것: 결과·레이팅·시간 컨트롤·오프닝(ECO)·종료 사유·타임스탬프·상대 레이팅·색상. 이것만으로 10개 이상 차트." />
      <Issue
        n="03" t="숫자 나열 = 인사이트 ≠ 진단"
        d="기존 화면은 4섹션이 동등한 무게로 늘어선 리스트. 개선안은 KPI 그리드 + 차트 리듬으로 한눈에 패턴이 보이게." />
      <Issue
        n="04" t="CTA · 시간 필터 제거"
        d="통계는 분석/관찰 전용. 액션 CTA 없음, 시간 필터(7d/30d/All) 없음 — 30일로 고정." />
      <Issue
        n="05" t="비교 기준은 자기 자신"
        d="peer 비교 대신 색상(W vs B), 시간 컨트롤, 상대 레이팅대로 자기 자신 안에서 비교 축을 만듦." />
    </div>
  );
  const Issue = ({ n, t, d }) => (
    <div style={{ display: 'grid', gridTemplateColumns: '32px 1fr', gap: 12 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: '#D03832',
                      fontFamily: "'IBM Plex Mono', monospace" }}>{n}</div>
      <div>
        <div style={{ fontSize: 14, fontWeight: 600, color: '#14140F' }}>{t}</div>
        <div style={{ fontSize: 12, color: '#62646A', marginTop: 4, lineHeight: 1.5 }}>{d}</div>
      </div>
    </div>
  );

  // ──────────────────────────────────────────────────────────────────────
  // App
  // ──────────────────────────────────────────────────────────────────────
  const App = () => {
    const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const kor = tweaks.lang !== 'en';

    return (
      <>
        <DesignCanvas
          title="Blundermate — Insights"
          subtitle="통계 화면 두 가지 개선 방향"
          bg="#1C1D1F"
        >
          <DCSection id="rationale"
            title="01 · 진단"
            subtitle="현재 화면의 문제와 개선 방향">
            <DCArtboard id="cover" label="Overview" width={720} height={ART_H}>
              <CoverArtboard />
            </DCArtboard>
            <DCArtboard id="before" label="Before — 문제점" width={480} height={ART_H}>
              <BeforeArtboard />
            </DCArtboard>
          </DCSection>

          <DCSection id="variants"
            title="02 · 변형"
            subtitle="A: 진단형 hero · B: 그리드 대시보드">
            <DCArtboard id="variant-a" label="A — Daily Card" width={ART_W} height={ART_H}>
              <PhoneFrame dark={tweaks.darkMode}>
                <BMInsightsVariantA kor={kor} tweaks={{
                  accent: tweaks.accentA,
                  chartStyle: tweaks.chartStyle,
                  density: tweaks.density,
                  darkMode: tweaks.darkMode,
                }} />
              </PhoneFrame>
            </DCArtboard>
            <DCArtboard id="variant-b" label="B — Grid Dashboard (전체 스크롤)" width={ART_W} height={ART_H}>
              <PhoneFrame dark={tweaks.darkMode}>
                <BMInsightsVariantB kor={kor} tweaks={{
                  accent: tweaks.accentB,
                  chartStyle: tweaks.chartStyle,
                  density: tweaks.density,
                  darkMode: tweaks.darkMode,
                }} />
              </PhoneFrame>
            </DCArtboard>
          </DCSection>

          <DCSection id="navigation"
            title="03 · 네비게이션 패턴 — Segmented Tabs"
            subtitle="11개 카드를 4개 그룹으로 분류 · 상단 알약형 4탭으로 전환.">
            <DCArtboard id="b-a" label="B-A — Segmented Tabs" width={ART_W} height={ART_H}>
              <PhoneFrame dark={tweaks.darkMode}>
                <BMInsightsB_A kor={kor} tweaks={{
                  accent: tweaks.accentB, chartStyle: tweaks.chartStyle,
                  density: tweaks.density, darkMode: tweaks.darkMode,
                }} />
              </PhoneFrame>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>

        <TweaksPanel title="Tweaks">
          <TweakSection title="공통">
            <TweakRadio label="언어"
              value={tweaks.lang}
              onChange={(v) => setTweak('lang', v)}
              options={[{ value: 'kor', label: '한글' }, { value: 'en', label: 'EN' }]} />
            <TweakRadio label="밀도"
              value={tweaks.density}
              onChange={(v) => setTweak('density', v)}
              options={[{ value: 'comfortable', label: '여유' }, { value: 'tight', label: '조밀' }]} />
            <TweakRadio label="차트 스타일"
              value={tweaks.chartStyle}
              onChange={(v) => setTweak('chartStyle', v)}
              options={[{ value: 'area', label: '면적' }, { value: 'line', label: '라인' }]} />
            <TweakToggle label="다크 모드"
              value={tweaks.darkMode}
              onChange={(v) => setTweak('darkMode', v)} />
          </TweakSection>

          <TweakSection title="A — Diagnosis">
            <TweakColor label="강조색"
              value={tweaks.accentA}
              onChange={(v) => setTweak('accentA', v)} />
            <TweakSelect label="강조 프리셋"
              value={tweaks.accentA}
              onChange={(v) => setTweak('accentA', v)}
              options={[
                { value: '#D03832', label: '블런더 레드' },
                { value: '#D97706', label: '미스 오렌지' },
                { value: '#C99B2D', label: '인어큐러시 앰버' },
                { value: '#2B5BD7', label: '잉크 블루' },
                { value: '#14140F', label: '먹' },
              ]} />
          </TweakSection>

          <TweakSection title="B — Grid">
            <TweakColor label="강조색"
              value={tweaks.accentB}
              onChange={(v) => setTweak('accentB', v)} />
            <TweakSelect label="강조 프리셋"
              value={tweaks.accentB}
              onChange={(v) => setTweak('accentB', v)}
              options={[
                { value: '#2B5BD7', label: '잉크 블루' },
                { value: '#3A8560', label: '브릴 그린' },
                { value: '#14140F', label: '먹' },
                { value: '#D03832', label: '블런더 레드' },
              ]} />
          </TweakSection>
        </TweaksPanel>
      </>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
